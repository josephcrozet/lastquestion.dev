<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <style>
    rect {
      fill: #1e1e2e;
    }
    text {
      fill: #cdd6f4;
      font-family: monospace;
      font-size: 20px;
      font-weight: 700;
    }
    @media (prefers-color-scheme: dark) {
      rect {
        fill: #eff1f5;
      }
      text {
        fill: #4c4f69;
      }
    }
  </style>
  <rect width="32" height="32" rx="4" />
  <text x="16" y="20" text-anchor="middle">&gt;_</text>
</svg>
