name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

env:
  ASTRO_TELEMETRY_DISABLED: true
  FORCE_COLOR: true

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
      - name: Set up Node
        uses: actions/setup-node@v7
        with:
          node-version: 26
      - name: Install
        run: bun install --frozen-lockfile
      - name: CI
        run: bun run ci
