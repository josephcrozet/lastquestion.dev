name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

env:
  ASTRO_TELEMETRY_DISABLED: true
  FORCE_COLOR: true

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Type check
        run: bun run check
      - name: Format check
        run: bun run format:check
      - name: Lint
        run: bun run lint
      - name: Knip
        run: bun run knip
      - name: Build
        run: bun run build
