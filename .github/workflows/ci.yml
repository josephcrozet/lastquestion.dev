name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

env:
  ASTRO_TELEMETRY_DISABLED: true
  FORCE_COLOR: true

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
      - name: Install
        run: bun install --frozen-lockfile
      - name: Format
        run: bun run format
      - name: Lint
        run: bun run lint
      - name: Check
        run: bun run check
      - name: Build
        run: bun run build
